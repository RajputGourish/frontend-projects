<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix</title>
    <link rel="stylesheet" href="signin.css">
</head>

<body>

    <div class="main">

        <nav class="logo">
            <img src="Assets/Images/logo.svg" alt="logo">
        </nav>

        <div class="box"></div>


        <div class="signin">
            <form action="">
                <h1 class="signtext">Sign In</h1>
                <div>
                    <input class="input" type="email" placeholder="Email or mobile number">
                </div>
                <div>
                    <input class="input" type="password" placeholder="Password">
                </div>
                <button class="button">Sign In</button>
                <div class="or">OR</div>
                <button class="button btncol">Use a sign-in code</button>
                <a class="forgetpw" href="">Forget password?</a>

                <div class="Remember">
                    <input type="checkbox" name="checkbox" id="Remember">
                    <span class="custom-checkbox"><img src="Assets/tick.svg" alt="tick"></span>
                    <label for="Remember">Remember me</label>
                </div>

                <div class="signup">New to Netflix?<a href="index.html">Sign up now.</a></div>

                <div class="lasttext">
                    <div>This page is protected by Google reCAPTCHA to ensure you're not a bot.</div>
                    <a class="Learn" href="">Learn more.</a>
                </div>

            </form>
        </div>

    </div>
    <footer>

        <div class="wrap">

            <div>Questions? Call 000-800-919-1743 (Toll-Free)</div>
            <div class="footer">
                <div><a href="">FAQ</a></div>
                <div><a href="">Help Centre</a></div>
                <div><a href="">Terms of Use</a></div>
                <div><a href="">Privacy</a></div>
                <div><a href="">Cookie Preferences</a></div>
                <div><a href="">Corporate Information</a></div>
            </div>

            <select name="lang" id="lang">
                <option value="English">English</option>
                <option value="English">हिन्दी</option>
            </select>
        </div>

    </footer>


</body>

</html>
